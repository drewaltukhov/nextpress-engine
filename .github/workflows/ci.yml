name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate plugin manifest
        run: npm run plugins:discover

      - name: Generate fumadocs sources
        run: npx fumadocs-mdx

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Prepare test DB when dev.db is absent (code-only mirror)
        # The private repo commits .local/dev.db (schema + seed), so `npm test`
        # runs against it. The public mirror excludes dev.db, so `db()` would
        # open an empty file and integration tests hit "no such table". When
        # dev.db is missing, build a migrated (schema-only) ci.db and point the
        # tests at it: seed-dependent cases skip, schema-dependent cases pass.
        run: |
          if [ ! -f .local/dev.db ]; then
            echo "No committed dev.db — building a migrated ci.db for tests."
            TURSO_DATABASE_URL="file:./.local/ci.db" npx tsx scripts/migrate.ts apply
            echo "TURSO_DATABASE_URL=file:./.local/ci.db" >> "$GITHUB_ENV"
          fi

      - name: Unit tests
        run: npm test

      - name: Migration plan (no drift)
        run: npm run migrate:plan
        env:
          TURSO_DATABASE_URL: "file:./.local/ci.db"

      - name: Apply migrations to ci.db
        # Next.js 16 stopped running the instrumentation hook (which boots
        # the engine + applies migrations) during page collection, so any
        # page in the prerender set whose module trace reaches a DB query
        # crashes the build with `no such table: site_settings`. Apply
        # migrations once up front so ci.db has the schema the prerender
        # step needs.
        run: npx tsx scripts/migrate.ts apply
        env:
          TURSO_DATABASE_URL: "file:./.local/ci.db"

      - name: Build
        run: npm run build
        env:
          TURSO_DATABASE_URL: "file:./.local/ci.db"
